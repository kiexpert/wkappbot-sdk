# Dialog handler: nkrunlite #32770 dialogs (untitled)
# Catches all #32770 dialogs from nkrunlite: reconnection prompt, notices, etc.
# Clicks "확인" button to dismiss. Waits for reconnection and retries.

match:
  class: "#32770"
  process: "nkrunlite"

action: click_button

params:
  button_text: "확인"
  wait_after: 5000      # 5s default — enough for most dialogs
  retry: true
