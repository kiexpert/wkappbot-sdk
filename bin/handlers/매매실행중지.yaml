# Dialog handler: 매매실행중지 안내
# When stopping trading, 영웅문 asks to cancel pending orders.
# Clicks "아니오" to keep orders and just stop trading.

match:
  title_contains: "매매실행중지"
  class: "#32770"
  process: "nkrunlite"

action: click_button

params:
  button_text: "아니오"   # keep pending orders, just stop trading
  wait_after: 2000
  retry: true
