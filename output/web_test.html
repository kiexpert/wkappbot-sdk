<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WKAppBot Web UI Test</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 700px; margin: 20px auto; padding: 20px; }
        h1 { color: #333; margin-bottom: 5px; }
        h2 { margin-top: 10px; margin-bottom: 8px; }
        .section { margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        label { display: block; margin: 6px 0 3px; font-weight: bold; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 6px; box-sizing: border-box; }
        textarea { height: 60px; resize: vertical; }
        button { padding: 8px 16px; margin: 3px; cursor: pointer; font-size: 13px; }
        .btn-primary { background: #2196F3; color: white; border: none; border-radius: 4px; }
        .btn-danger { background: #f44336; color: white; border: none; border-radius: 4px; }
        #result { margin-top: 8px; padding: 10px; background: #f0f0f0; border-radius: 4px; min-height: 20px; }
        .counter { font-size: 20px; font-weight: bold; color: #2196F3; }
        .log-area { font-family: monospace; font-size: 12px; background: #1e1e1e; color: #0f0; padding: 8px; border-radius: 4px; min-height: 40px; max-height: 120px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background: #f5f5f5; }
        .radio-group label { display: inline; margin-right: 15px; font-weight: normal; }
        #progress-bar { width: 100%; height: 20px; }
    </style>
</head>
<body>
    <h1>WKAppBot Web Test Page</h1>
    <p id="subtitle">Phase 1: In-page interactions test bed</p>

    <!-- 1. Buttons -->
    <div class="section">
        <h2>1. Buttons</h2>
        <button id="btn-hello" class="btn-primary" onclick="setResult('Hello from WKAppBot!')">Say Hello</button>
        <button id="btn-count" onclick="count++; document.getElementById('counter').textContent=count; log('Count: '+count)">Count Up</button>
        <button id="btn-reset" class="btn-danger" onclick="resetAll()">Reset All</button>
        <div>Counter: <span id="counter" class="counter" role="status">0</span></div>
    </div>

    <!-- 2. Text Input -->
    <div class="section">
        <h2>2. Text Input</h2>
        <label for="name-input">Name:</label>
        <input type="text" id="name-input" placeholder="Enter your name" aria-label="Name input">
        <label for="message-input">Message:</label>
        <input type="text" id="message-input" placeholder="Enter a message" aria-label="Message input">
        <button id="btn-greet" onclick="greet()">Greet</button>
        <button id="btn-clear-inputs" onclick="clearInputs()">Clear Inputs</button>
    </div>

    <!-- 3. Textarea -->
    <div class="section">
        <h2>3. Textarea</h2>
        <label for="notes">Notes:</label>
        <textarea id="notes" aria-label="Notes textarea" placeholder="Write something here..."></textarea>
        <button id="btn-word-count" onclick="wordCount()">Word Count</button>
    </div>

    <!-- 4. Checkbox, Radio, Select -->
    <div class="section">
        <h2>4. Form Controls</h2>
        <label><input type="checkbox" id="chk-bold" onchange="toggleBold()"> Bold Result</label>
        <label><input type="checkbox" id="chk-color" onchange="toggleColor()"> Blue Color</label>
        <label><input type="checkbox" id="chk-uppercase" onchange="toggleUppercase()"> UPPERCASE</label>

        <label style="margin-top:10px; font-weight:bold">Theme:</label>
        <div class="radio-group" role="radiogroup" aria-label="Theme selection">
            <label><input type="radio" name="theme" id="radio-light" value="light" checked onchange="changeTheme('light')"> Light</label>
            <label><input type="radio" name="theme" id="radio-dark" value="dark" onchange="changeTheme('dark')"> Dark</label>
            <label><input type="radio" name="theme" id="radio-blue" value="blue" onchange="changeTheme('blue')"> Blue</label>
        </div>

        <label for="font-select">Font Size:</label>
        <select id="font-select" onchange="changeFont()" aria-label="Font size selector">
            <option value="14">Normal (14px)</option>
            <option value="18">Medium (18px)</option>
            <option value="24">Large (24px)</option>
            <option value="32">XLarge (32px)</option>
        </select>

        <label for="number-input">Number (1-100):</label>
        <input type="number" id="number-input" min="1" max="100" value="50" aria-label="Number input">
        <button id="btn-double" onclick="doubleNumber()">Double It</button>
    </div>

    <!-- 5. Progress -->
    <div class="section">
        <h2>5. Progress</h2>
        <progress id="progress-bar" value="0" max="100">0%</progress>
        <span id="progress-text">0%</span>
        <div>
            <button id="btn-progress-10" onclick="setProgress(10)">+10%</button>
            <button id="btn-progress-50" onclick="setProgress(50)">Set 50%</button>
            <button id="btn-progress-100" onclick="setProgress(100)">Set 100%</button>
            <button id="btn-progress-0" onclick="setProgress(0)">Reset 0%</button>
        </div>
    </div>

    <!-- 6. Dynamic Table -->
    <div class="section">
        <h2>6. Dynamic Table</h2>
        <table id="data-table" aria-label="Data table">
            <thead><tr><th>#</th><th>Action</th><th>Time</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
        <button id="btn-add-row" onclick="addRow()">Add Row</button>
        <button id="btn-clear-table" onclick="clearTable()">Clear Table</button>
    </div>

    <!-- Result -->
    <div class="section">
        <h2>Result</h2>
        <div id="result" role="status" aria-live="polite" aria-label="Result display">Ready</div>
    </div>

    <!-- Action Log -->
    <div class="section">
        <h2>Action Log</h2>
        <div id="action-log" class="log-area" role="log" aria-label="Action log"></div>
    </div>

    <script>
        let count = 0;
        let rowCount = 0;

        function setResult(text) {
            document.getElementById('result').textContent = text;
            log('Result: ' + text);
        }

        function log(msg) {
            const el = document.getElementById('action-log');
            const time = new Date().toLocaleTimeString();
            el.textContent += `[${time}] ${msg}\n`;
            el.scrollTop = el.scrollHeight;
        }

        function greet() {
            const name = document.getElementById('name-input').value || 'World';
            const msg = document.getElementById('message-input').value || 'Nice to meet you';
            setResult(`Hello ${name}! ${msg}`);
        }

        function clearInputs() {
            document.getElementById('name-input').value = '';
            document.getElementById('message-input').value = '';
            log('Inputs cleared');
        }

        function wordCount() {
            const text = document.getElementById('notes').value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            setResult(`Word count: ${words}`);
        }

        function resetAll() {
            count = 0;
            document.getElementById('counter').textContent = '0';
            document.getElementById('result').textContent = 'Ready';
            document.getElementById('name-input').value = '';
            document.getElementById('message-input').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('progress-bar').value = 0;
            document.getElementById('progress-text').textContent = '0%';
            clearTable();
            log('All reset');
        }

        function toggleBold() {
            const r = document.getElementById('result');
            r.style.fontWeight = document.getElementById('chk-bold').checked ? 'bold' : 'normal';
            log('Bold: ' + document.getElementById('chk-bold').checked);
        }

        function toggleColor() {
            const r = document.getElementById('result');
            r.style.color = document.getElementById('chk-color').checked ? '#2196F3' : '';
            log('Blue: ' + document.getElementById('chk-color').checked);
        }

        function toggleUppercase() {
            const r = document.getElementById('result');
            r.style.textTransform = document.getElementById('chk-uppercase').checked ? 'uppercase' : '';
            log('Uppercase: ' + document.getElementById('chk-uppercase').checked);
        }

        function changeTheme(theme) {
            const themes = {
                light: { bg: '#fff', fg: '#333' },
                dark: { bg: '#1e1e1e', fg: '#eee' },
                blue: { bg: '#e3f2fd', fg: '#0d47a1' }
            };
            document.body.style.background = themes[theme].bg;
            document.body.style.color = themes[theme].fg;
            log('Theme: ' + theme);
        }

        function changeFont() {
            const size = document.getElementById('font-select').value;
            document.getElementById('result').style.fontSize = size + 'px';
            log('Font: ' + size + 'px');
        }

        function doubleNumber() {
            const input = document.getElementById('number-input');
            const val = parseInt(input.value) || 0;
            input.value = val * 2;
            setResult(`${val} x 2 = ${val * 2}`);
        }

        function setProgress(val) {
            document.getElementById('progress-bar').value = val;
            document.getElementById('progress-text').textContent = val + '%';
            log('Progress: ' + val + '%');
        }

        function addRow() {
            rowCount++;
            const tbody = document.getElementById('table-body');
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${rowCount}</td><td>Action ${rowCount}</td><td>${new Date().toLocaleTimeString()}</td>`;
            tbody.appendChild(tr);
            log('Row added: #' + rowCount);
        }

        function clearTable() {
            document.getElementById('table-body').innerHTML = '';
            rowCount = 0;
            log('Table cleared');
        }

        log('Page loaded — ready for WKAppBot!');
    </script>
</body>
</html>
