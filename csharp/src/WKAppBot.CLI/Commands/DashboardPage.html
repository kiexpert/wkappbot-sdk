<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>WKAppBot Dashboard</title>
<style>
:root { --bg: #1a1a2e; --surface: #16213e; --primary: #0f3460; --accent: #e94560; --text: #eee; --muted: #888; --border: #2a2a4a; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; height: 100vh; display: flex; flex-direction: column; }
header { background: var(--primary); padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header h1 { font-size: 16px; font-weight: 600; }
header .status { font-size: 12px; color: var(--muted); }
header .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
header .dot.on { background: #4caf50; }
header .dot.off { background: var(--accent); }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#messages { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
.msg { padding: 6px 10px; border-radius: 6px; background: var(--surface); border-left: 3px solid var(--border); max-width: 100%; word-break: break-word; }
.msg .meta { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.msg .meta .user { color: var(--accent); font-weight: 600; }
.msg .meta .type { background: var(--primary); padding: 1px 5px; border-radius: 3px; font-size: 10px; }
.msg .body { white-space: pre-wrap; font-size: 13px; line-height: 1.4; }
.msg.slack { border-left-color: #4a154b; }
.msg.eye { border-left-color: #4caf50; }
.msg.debate { border-left-color: #ff9800; }
.msg.cmd { border-left-color: var(--accent); }
.msg.suggest { border-left-color: #2196f3; }
.thread-badge { background: #ff9800; color: #000; padding: 1px 5px; border-radius: 3px; font-size: 10px; cursor: pointer; }
#input-bar { display: flex; padding: 8px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
#input-bar input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; outline: none; }
#input-bar input:focus { border-color: var(--accent); }
#input-bar button { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; margin-left: 8px; cursor: pointer; font-weight: 600; }
#eye-bar { background: var(--surface); padding: 6px 12px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); display: flex; gap: 16px; flex-shrink: 0; overflow-x: auto; }
#eye-bar .card { background: var(--primary); padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
@media (max-width: 600px) { .msg .body { font-size: 12px; } header h1 { font-size: 14px; } }
</style>
</head>
<body>
<header>
  <h1>WKAppBot</h1>
  <span class="dot" id="ws-dot"></span>
  <span class="status" id="ws-status">connecting...</span>
  <span class="status" id="client-count"></span>
</header>
<div id="eye-bar"></div>
<div class="main">
  <div id="messages"></div>
</div>
<div id="input-bar">
  <input id="cmd-input" type="text" placeholder="Type a command..." autocomplete="off">
  <button id="send-btn">Send</button>
</div>

<script>
const msgBox = document.getElementById('messages');
const input = document.getElementById('cmd-input');
const sendBtn = document.getElementById('send-btn');
const wsDot = document.getElementById('ws-dot');
const wsStatus = document.getElementById('ws-status');
const clientCount = document.getElementById('client-count');
const eyeBar = document.getElementById('eye-bar');

let ws = null;
let reconnectDelay = 1000;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/`);

  ws.onopen = () => {
    wsDot.className = 'dot on';
    wsStatus.textContent = 'connected';
    reconnectDelay = 1000;
  };

  ws.onclose = () => {
    wsDot.className = 'dot off';
    wsStatus.textContent = `reconnecting (${reconnectDelay/1000}s)...`;
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 10000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'eye-status') {
        updateEyeBar(msg.text);
        return;
      }
      appendMessage(msg);
    } catch {}
  };
}

function appendMessage(msg) {
  const div = document.createElement('div');
  div.className = `msg ${msg.type || ''}`;

  const ts = new Date(msg.ts).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const user = msg.user || 'system';
  const type = msg.type || 'info';
  const thread = msg.thread ? `<span class="thread-badge">${msg.thread.slice(-6)}</span>` : '';

  div.innerHTML = `<div class="meta"><span class="user">${esc(user)}</span> <span class="type">${type}</span> ${thread} <span>${ts}</span></div><div class="body">${esc(msg.text || '')}</div>`;
  msgBox.appendChild(div);

  // Auto-scroll if near bottom
  if (msgBox.scrollHeight - msgBox.scrollTop - msgBox.clientHeight < 200)
    msgBox.scrollTop = msgBox.scrollHeight;

  // Cap DOM nodes
  while (msgBox.children.length > 500)
    msgBox.removeChild(msgBox.firstChild);
}

function updateEyeBar(text) {
  eyeBar.innerHTML = text.split('\n').filter(l => l.trim()).map(l =>
    `<span class="card">${esc(l.trim())}</span>`
  ).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(text);
  input.value = '';
}

sendBtn.onclick = send;
input.onkeydown = (e) => { if (e.key === 'Enter') send(); };

connect();
</script>
</body>
</html>
