# Handler for: "LS증권 투혼" — 투혼 HTS 범용 #32770 다이얼로그 자동 처리
# VBScript 오류(Calendar2.Format 등), 알림 팝업 등 자동 닫기
# Filename "LS증권 투혼" triggers for any #32770 dialog from 투혼 process.

match:
  class: "#32770"
  process: "XingQSmartMain"

action: click_button

params:
  button_text: "확인"     # "확인" 버튼 클릭 (가장 안전한 dismiss)
  button_index: 0         # fallback: 첫 번째 버튼
  wait_after: 500         # 500ms 대기 (빠른 연속 처리 위해 1000→500)
  retry: true             # 원래 액션 재시도
