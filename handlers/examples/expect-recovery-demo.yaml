scenario:
  name: "Expect-Recovery Demo"
  description: "Demonstrates the P1 expect-recovery pattern: action → poll expected state → recovery on failure"

app:
  launch: "notepad.exe"
  wait_for_window:
    title_contains: "Notepad"
    timeout: 5

steps:
  # Step 1: Type text (no expect — simple action)
  - name: "Type hello"
    action: type_text
    target: { control_type: "Edit" }
    params: { text: "Hello World" }

  # Step 2: Hotkey Ctrl+S → expect Save As dialog to appear
  - name: "Save file"
    action: hotkey
    params: { keys: ["Control", "s"] }
    expect:
      condition: window_present
      target: { name: "*Save*" }
      timeout: 5
    recovery:
      action: hotkey
      params: { keys: ["Control", "s"] }
      retry: false
      max_retries: 2

  # Step 3: Cancel save → expect dialog to disappear
  - name: "Cancel save"
    action: press_key
    params: { key: Escape }
    expect:
      condition: window_absent
      target: { name: "*Save*" }
      timeout: 3
