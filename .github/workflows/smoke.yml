name: smoke-csharp

on:
  workflow_run:
    workflows: ["build-csharp"]
    types: [completed]
  workflow_dispatch:

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_branch }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Smoke test --help
      shell: pwsh
      run: dotnet run --project csharp/src/WKAppBot.CLI -- --help

    - name: Smoke test usage
      shell: pwsh
      run: dotnet run --project csharp/src/WKAppBot.CLI -- usage
