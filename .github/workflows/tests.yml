name: unit-tests

on:
  push:
    paths: ['csharp/**']
  pull_request:
    paths: ['csharp/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Run unit tests
      shell: pwsh
      run: |
        dotnet test csharp/tests/WKAppBot.Tests/WKAppBot.Tests.csproj `
          --verbosity minimal `
          --logger "trx;LogFileName=results.trx" `
          --collect:"XPlat Code Coverage"

    - name: Upload test results
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: '**/*.trx'
