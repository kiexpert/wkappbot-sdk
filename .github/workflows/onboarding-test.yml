name: onboarding-test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC

jobs:
  onboarding-test:
    runs-on: windows-latest
    steps:
    - name: Download latest wkappbot release
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $asset = gh release view --repo kiexpert/wkappbot-sdk --json assets `
          | ConvertFrom-Json `
          | Select-Object -ExpandProperty assets `
          | Where-Object { $_.name -like '*.zip' } `
          | Select-Object -First 1
        if (-not $asset) { throw 'No zip asset found in latest release.' }
        Write-Host "Downloading: $($asset.name)"
        Invoke-WebRequest -Uri $asset.url -OutFile release.zip
        Expand-Archive release.zip -DestinationPath release -Force

    - name: Run wkappbot help
      shell: pwsh
      id: help
      run: |
        $exe = Get-ChildItem -Recurse -Filter wkappbot.exe release | Select-Object -First 1
        if (-not $exe) { throw 'wkappbot.exe not found in release zip.' }
        $out = & $exe.FullName help 2>&1 | Out-String
        Write-Host $out
        $out | Set-Content help_output.txt -Encoding utf8

    - name: Validate help output + AI summary (Groq->Cerebras->Gemini)
      shell: python
      env:
        GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
        GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        CEREBRAS_API_KEY:  ${{ secrets.CEREBRAS_API_KEY }}
      run: |
        import os, sys, json, urllib.request, urllib.error

        help_text = open("help_output.txt", encoding="utf-8").read()

        # Primary check: help output must contain required keywords (no AI needed)
        required = ["a11y", "grap", "CDP", "wkappbot"]
        missing = [kw for kw in required if kw not in help_text]
        if missing:
            print(f"FAIL: help output missing required keywords: {missing}")
            sys.exit(1)
        print(f"Help output check PASS: {required}")

        prompt = (
            "This is the output of `wkappbot help`. "
            "List 5 key things this tool can do. Be specific, under 100 words total.\n\n"
            + help_text
        )

        def call_groq(api_key):
            body = json.dumps({
                "model": "llama-3.3-70b-versatile",
                "messages": [{"role": "user", "content": prompt}],
                "max_tokens": 200,
            }).encode()
            req = urllib.request.Request(
                "https://api.groq.com/openai/v1/chat/completions",
                data=body,
                headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
            )
            with urllib.request.urlopen(req, timeout=30) as r:
                return json.loads(r.read())["choices"][0]["message"]["content"]

        def call_cerebras(api_key):
            body = json.dumps({
                "model": "llama-3.3-70b",
                "messages": [{"role": "user", "content": prompt}],
                "max_tokens": 200,
            }).encode()
            req = urllib.request.Request(
                "https://api.cerebras.ai/v1/chat/completions",
                data=body,
                headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
            )
            with urllib.request.urlopen(req, timeout=30) as r:
                return json.loads(r.read())["choices"][0]["message"]["content"]

        def call_gemini(api_key):
            body = json.dumps({"contents": [{"parts": [{"text": prompt}]}]}).encode()
            url = (
                "https://generativelanguage.googleapis.com/v1beta/models/"
                "gemini-2.0-flash:generateContent?key=" + api_key
            )
            req = urllib.request.Request(url, data=body, headers={"Content-Type": "application/json"})
            with urllib.request.urlopen(req, timeout=30) as r:
                return json.loads(r.read())["candidates"][0]["content"]["parts"][0]["text"]

        reply = None
        for name, fn, key_env in [
            ("Groq",     call_groq,     "GROQ_API_KEY"),
            ("Cerebras", call_cerebras, "CEREBRAS_API_KEY"),
            ("Gemini",   call_gemini,   "GEMINI_API_KEY"),
        ]:
            key = os.environ.get(key_env, "")
            if not key:
                print(f"SKIP {name}: no API key")
                continue
            try:
                reply = fn(key)
                print(f"[{name}] response:\n{reply}")
                break
            except urllib.error.HTTPError as e:
                err = e.read().decode()
                if e.code == 429:
                    print(f"SKIP {name}: rate limit (429) -- trying next")
                else:
                    print(f"SKIP {name}: HTTP {e.code} -- trying next\n{err}")

        if reply is None:
            print("AI summary SKIP: all providers unavailable -- help output check already passed")
            sys.exit(0)

        keywords = ["a11y", "grap", "cdp", "automation", "window", "click", "ai"]
        found = [kw for kw in keywords if kw in reply.lower()]
        print(f"\nMatched keywords: {found} ({len(found)}/7)")

        if len(found) >= 2:
            print("\nAI summary PASS")
        else:
            print("\nAI summary WARN -- fewer than 2 keywords (non-blocking)")
