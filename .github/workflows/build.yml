name: build-launcher

on:
  push:
    paths:
      - 'csharp/**'
      - 'handlers/**'
      - 'skills/**'
      - 'scripts/smoke-help.ps1'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  detect:
    runs-on: windows-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Detect changes
      id: diff
      shell: pwsh
      run: |
        if ('${{ github.event_name }}' -ne 'push') {
          "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0
        }
        $before = '${{ github.event.before }}'
        $after  = '${{ github.sha }}'
        if ([string]::IsNullOrWhiteSpace($before) -or $before -match '^0+$') {
          "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0
        }
        $files   = git diff --name-only $before $after
        $changed = @($files | Where-Object {
          $_ -match '^(csharp/|handlers/|skills/|scripts/smoke-help\.ps1|\.github/workflows/build\.yml$)'
        })
        $out = if ($changed.Count -gt 0) { 'true' } else { 'false' }
        "changed=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  build:
    needs: [detect]
    if: ${{ needs.detect.outputs.changed == 'true' }}
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history needed for git pickaxe patch version counting

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore NuGet cache
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/.nuget/packages
          ~\AppData\Local\NuGet\v3-cache
        key: ${{ runner.os }}-nuget-${{ hashFiles('csharp/**/*.cs', 'csharp/**/*.csproj', 'csharp/**/*.props', 'csharp/**/*.targets', 'csharp/WKAppBot.sln') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore build cache
      uses: actions/cache/restore@v4
      with:
        path: |
          bin
          csharp/**/obj
        key: ${{ runner.os }}-sdk-build-${{ hashFiles('csharp/**/*.cs', 'csharp/**/*.csproj', 'csharp/**/*.props', 'csharp/**/*.targets', 'csharp/WKAppBot.sln') }}
        restore-keys: |
          ${{ runner.os }}-sdk-build-run-
          ${{ runner.os }}-sdk-build-

    - name: Restore build state
      id: restore_state
      uses: actions/cache/restore@v4
      with:
        path: .ci-state/build
        key: ${{ runner.os }}-sdk-build-state-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-sdk-build-state-

    - name: Clean after failed build
      shell: pwsh
      run: |
        $marker = '.ci-state/build/last_build_failed.txt'
        if ((Test-Path $marker) -and ((Get-Content $marker -Raw).Trim() -eq 'true')) {
          Write-Host 'Previous build failed -- cleaning.'
          if (Test-Path ./bin) { Remove-Item ./bin -Recurse -Force }
          Get-ChildItem -Path csharp -Directory -Recurse -Filter obj |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          dotnet clean csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj -c Release
          dotnet clean csharp/src/WKAppBot.CLI/WKAppBot.CLI.csproj -c Release
        }

    - name: Ensure bin dir
      shell: pwsh
      run: New-Item -ItemType Directory -Force -Path bin | Out-Null

    # --- Launcher (public source) ---
    - name: Build launcher
      shell: pwsh
      run: |
        dotnet publish csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj `
          --configuration Release `
          -p:SkipDeployLauncher=true `
          -o bin

    # --- Core: fetch pre-built binary from private repo's latest release ---
    # Downloads the latest release ZIP from WKAPPBOT_CORE_REPO (private dev repo),
    # extracts wkappbot-core.exe, and places it in bin/. Falls back to source build.
    - name: Fetch core binary (private release)
      id: fetch_core
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.WKAPPBOT_CORE_PAT }}
        CORE_REPO: ${{ secrets.WKAPPBOT_CORE_REPO }}
      run: |
        if (-not $env:CORE_REPO -or -not $env:GH_TOKEN) {
          Write-Host 'WKAPPBOT_CORE_REPO / WKAPPBOT_CORE_PAT not set -- will build from source.'
          "fetched=false" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0
        }
        Write-Host "Fetching wkappbot-core.exe from $env:CORE_REPO (latest core-* release)..."
        try {
          # Find the latest core-* tagged release (SDK-specific builds, not the public build-* releases)
          $tag = gh release list --repo $env:CORE_REPO --json tagName,createdAt `
            | ConvertFrom-Json `
            | Where-Object { $_.tagName -like 'core-*' } `
            | Sort-Object createdAt -Descending `
            | Select-Object -First 1 -ExpandProperty tagName
          if (-not $tag) {
            Write-Host "No core-* release found in $env:CORE_REPO -- will build from source."
            "fetched=false" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          Write-Host "Found: $tag"
          gh release download $tag --repo $env:CORE_REPO --pattern "wkappbot-core.exe" --dir bin --clobber
          if (-not (Test-Path bin/wkappbot-core.exe)) {
            Write-Host "wkappbot-core.exe not found in release $tag -- will build from source."
            "fetched=false" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          Write-Host "Fetched: $('{0:N1} MB' -f ((Get-Item bin/wkappbot-core.exe).Length / 1MB)) from $tag"
          "fetched=true" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        } catch {
          Write-Host "Fetch failed ($_) -- will build from source."
          "fetched=false" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        }

    - name: Build core (source fallback)
      if: ${{ steps.fetch_core.outputs.fetched != 'true' }}
      shell: pwsh
      run: |
        dotnet publish csharp/src/WKAppBot.CLI/WKAppBot.CLI.csproj `
          --configuration Release `
          -p:SkipDeployCore=true `
          -o bin

    - name: Seed bin/wkappbot.hq
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/skills   | Out-Null
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/handlers | Out-Null
        if (Test-Path wkappbot.hq) {
          Copy-Item -Path wkappbot.hq/* -Destination bin/wkappbot.hq -Recurse -Force
        }
        if (Test-Path skills)   { Copy-Item -Path skills/*   -Destination bin/wkappbot.hq/skills   -Recurse -Force }
        if (Test-Path handlers) { Copy-Item -Path handlers/* -Destination bin/wkappbot.hq/handlers -Recurse -Force }

    - name: Write build info
      shell: pwsh
      run: |
        $info = [ordered]@{
          run_id   = "${{ github.run_id }}"
          sha      = "${{ github.sha }}"
          built_at = (Get-Date -AsUTC -Format o)
        } | ConvertTo-Json -Compress
        $info | Set-Content -Path bin/build_info.json -Encoding utf8

    - name: Verify binaries
      shell: pwsh
      run: |
        if (!(Test-Path ./bin/wkappbot.exe))      { throw 'bin/wkappbot.exe missing' }
        if (!(Test-Path ./bin/wkappbot-core.exe)) { throw 'bin/wkappbot-core.exe missing' }
        $v = & ./bin/wkappbot.exe --version 2>&1 | Select-String 'wkappbot v'
        if (!$v) { throw 'wkappbot --version produced no version line' }
        Write-Host "Binary verified: $v"

    - name: Mark build success
      if: ${{ success() }}
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path .ci-state/build | Out-Null
        'false' | Set-Content .ci-state/build/last_build_failed.txt -Encoding ascii

    - name: Mark build failure
      if: ${{ failure() }}
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path .ci-state/build | Out-Null
        'true' | Set-Content .ci-state/build/last_build_failed.txt -Encoding ascii

    - name: Save build cache
      if: ${{ always() }}
      uses: actions/cache/save@v4
      with:
        path: |
          bin
          csharp/**/obj
        key: ${{ runner.os }}-sdk-build-run-${{ github.run_id }}

    - name: Save build state
      if: ${{ always() }}
      uses: actions/cache/save@v4
      with:
        path: .ci-state/build
        key: ${{ runner.os }}-sdk-build-state-${{ github.run_id }}

    - name: Upload bin artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: wkappbot-bin-${{ github.run_id }}
        path: bin/**
        if-no-files-found: warn

  smoke:
    needs: [detect, build]
    if: ${{ always() && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore cached bin
      uses: actions/cache/restore@v4
      with:
        path: bin
        key: ${{ runner.os }}-sdk-build-${{ hashFiles('csharp/**/*.cs', 'csharp/**/*.csproj', 'csharp/**/*.props', 'csharp/**/*.targets', 'csharp/WKAppBot.sln') }}
        restore-keys: |
          ${{ runner.os }}-sdk-build-run-
          ${{ runner.os }}-sdk-build-

    - name: Download bin artifact
      if: ${{ needs.build.result == 'success' }}
      uses: actions/download-artifact@v4
      with:
        name: wkappbot-bin-${{ github.run_id }}
        path: bin

    - name: Rebuild bin if missing
      shell: pwsh
      run: |
        if ((Test-Path ./bin/wkappbot.exe) -and (Test-Path ./bin/wkappbot-core.exe)) {
          Write-Host 'Bin already present.'; exit 0
        }
        Write-Host 'Bin missing -- fallback rebuild.'
        New-Item -ItemType Directory -Force -Path bin | Out-Null
        dotnet publish csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj --configuration Release -p:SkipDeployLauncher=true -o bin
        dotnet publish csharp/src/WKAppBot.CLI/WKAppBot.CLI.csproj             --configuration Release -p:SkipDeployCore=true    -o bin
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/skills   | Out-Null
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/handlers | Out-Null
        if (Test-Path wkappbot.hq) { Copy-Item -Path wkappbot.hq/* -Destination bin/wkappbot.hq -Recurse -Force }
        if (Test-Path skills)      { Copy-Item -Path skills/*      -Destination bin/wkappbot.hq/skills   -Recurse -Force }
        if (Test-Path handlers)    { Copy-Item -Path handlers/*    -Destination bin/wkappbot.hq/handlers -Recurse -Force }

    - name: Seed bin/wkappbot.hq
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/skills   | Out-Null
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/handlers | Out-Null
        if (Test-Path wkappbot.hq) { Copy-Item -Path wkappbot.hq/* -Destination bin/wkappbot.hq -Recurse -Force }
        if (Test-Path skills)      { Copy-Item -Path skills/*      -Destination bin/wkappbot.hq/skills   -Recurse -Force }
        if (Test-Path handlers)    { Copy-Item -Path handlers/*    -Destination bin/wkappbot.hq/handlers -Recurse -Force }

    - name: User-centric smoke test
      shell: pwsh
      run: |
        $file    = 'scripts/smoke-help.ps1'
        $outFile = "$file.smoke.txt"
        $lines   = & pwsh -NoProfile -ExecutionPolicy Bypass -File $file 2>&1
        $code    = $LASTEXITCODE
        @(
          "commit: ${{ github.sha }}",
          "workflow: build-launcher/smoke",
          "script: $file",
          "exitcode: $code",
          "timestamp_utc: $(Get-Date -AsUTC -Format o)",
          ""
        ) + @($lines) | Set-Content -Path $outFile -Encoding utf8
        $lines | ForEach-Object { Write-Host $_ }
        exit $code

    - name: Commit smoke sidecar
      if: ${{ always() && github.event_name == 'push' }}
      shell: pwsh
      run: |
        git config user.name  'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        $changed = @(git status --porcelain -- '**/*.smoke.txt')
        if ($changed.Count -eq 0) { Write-Host 'No smoke sidecar changes.'; exit 0 }
        git add -- '**/*.smoke.txt'
        git commit -m 'test: update build smoke sidecar files [skip ci]'
        $ok = $false
        for ($i = 1; $i -le 5; $i++) {
          git pull --rebase origin main
          git push origin HEAD:main
          if ($LASTEXITCODE -eq 0) { $ok = $true; Write-Host "Pushed (attempt $i)"; break }
          Write-Host "Push attempt $i failed, retrying..."
          Start-Sleep -Seconds (2 * $i)
        }
        if (-not $ok) { Write-Host 'All push attempts failed'; exit 1 }
