name: build-csharp

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Core
      shell: pwsh
      run: dotnet restore csharp/src/WKAppBot.Core/WKAppBot.Core.csproj

    - name: Build Core
      shell: pwsh
      run: dotnet build csharp/src/WKAppBot.Core/WKAppBot.Core.csproj --configuration Release --no-restore

    - name: Restore Launcher
      shell: pwsh
      run: dotnet restore csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj

    - name: Build Launcher
      shell: pwsh
      run: dotnet build csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj --configuration Release --no-restore
