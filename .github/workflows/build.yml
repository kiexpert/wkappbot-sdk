name: build-csharp

on:
  push:
    paths:
      - 'csharp/**'
      - 'handlers/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  detect:
    runs-on: windows-latest
    outputs:
      csharp_changed: ${{ steps.diff.outputs.csharp_changed }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Detect C# changes
      id: diff
      shell: pwsh
      run: |
        if ('${{ github.event_name }}' -ne 'push') {
          "csharp_changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0
        }
        $before = '${{ github.event.before }}'
        $after = '${{ github.sha }}'
        if ([string]::IsNullOrWhiteSpace($before) -or $before -match '^0+$') {
          "csharp_changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0
        }
        $files = git diff --name-only $before $after
        $changed = @($files | Where-Object { $_ -match '^(csharp/|handlers/|\.github/workflows/build\.yml$)' })
        if ($changed.Count -gt 0) {
          "csharp_changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        } else {
          "csharp_changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        }

  build:
    needs: [detect]
    if: ${{ needs.detect.outputs.csharp_changed == 'true' }}
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore NuGet packages
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/.nuget/packages
          ~\AppData\Local\NuGet\v3-cache
        key: ${{ runner.os }}-nuget-${{ hashFiles('csharp/**/*.cs', 'csharp/**/*.csproj', 'csharp/**/*.props', 'csharp/**/*.targets', 'csharp/**/*.xaml', 'csharp/WKAppBot.sln') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Restore build cache
      id: restore_build_cache
      uses: actions/cache/restore@v4
      with:
        path: |
          bin
          csharp/**/obj
        key: ${{ runner.os }}-wkappbot-build-${{ hashFiles('csharp/**/*.cs', 'csharp/**/*.csproj', 'csharp/**/*.props', 'csharp/**/*.targets', 'csharp/**/*.xaml', 'csharp/WKAppBot.sln') }}
        restore-keys: |
          ${{ runner.os }}-wkappbot-build-run-
          ${{ runner.os }}-wkappbot-build-
    - name: Restore previous build state
      id: restore_build_state
      uses: actions/cache/restore@v4
      with:
        path: .ci-state/build
        key: ${{ runner.os }}-wkappbot-build-state-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-wkappbot-build-state-
    - name: Decide clean build
      id: decide_clean
      shell: pwsh
      run: |
        $marker = '.ci-state/build/last_build_failed.txt'
        if (Test-Path $marker) {
          $value = (Get-Content $marker -Raw).Trim().ToLowerInvariant()
          if ($value -eq 'true') {
            'need_clean=true' | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
        }
        'need_clean=false' | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
    - name: Clean after previous failed build
      if: ${{ steps.decide_clean.outputs.need_clean == 'true' }}
      shell: pwsh
      run: |
        if (Test-Path ./bin) { Remove-Item ./bin -Recurse -Force }
        Get-ChildItem -Path csharp -Directory -Recurse -Filter obj | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        dotnet clean csharp/src/WKAppBot.CLI/WKAppBot.CLI.csproj -c Release
        dotnet clean csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj -c Release
    - name: Ensure bin dir
      shell: pwsh
      run: New-Item -ItemType Directory -Force -Path bin | Out-Null
    - name: Publish Core to repo bin
      shell: pwsh
      run: dotnet publish csharp/src/WKAppBot.CLI/WKAppBot.CLI.csproj --configuration Release -p:SkipDeployCore=true -o bin
    - name: Publish Launcher to repo bin
      shell: pwsh
      run: dotnet publish csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj --configuration Release -p:SkipDeployLauncher=true -o bin
    - name: Seed bin/wkappbot.hq from repo
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq | Out-Null
        if (Test-Path wkappbot.hq) {
          Copy-Item -Path wkappbot.hq/* -Destination bin/wkappbot.hq -Recurse -Force
        }
    - name: Install skills to bin/wkappbot.hq
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/skills | Out-Null
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/handlers | Out-Null
        Copy-Item -Path skills/* -Destination bin/wkappbot.hq/skills -Recurse -Force
        Copy-Item -Path handlers/* -Destination bin/wkappbot.hq/handlers -Recurse -Force
    - name: Verify official binaries
      shell: pwsh
      run: |
        if (!(Test-Path ./bin/wkappbot.exe)) { throw 'bin/wkappbot.exe missing' }
        if (!(Test-Path ./bin/wkappbot-core.exe)) { throw 'bin/wkappbot-core.exe missing' }
    - name: Mark build success
      if: ${{ success() }}
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path .ci-state/build | Out-Null
        'false' | Set-Content .ci-state/build/last_build_failed.txt -Encoding ascii
    - name: Mark build failure
      if: ${{ failure() }}
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path .ci-state/build | Out-Null
        'true' | Set-Content .ci-state/build/last_build_failed.txt -Encoding ascii
    - name: Save build snapshot cache
      if: ${{ always() }}
      uses: actions/cache/save@v4
      with:
        path: |
          bin
          csharp/**/obj
        key: ${{ runner.os }}-wkappbot-build-run-${{ github.run_id }}
    - name: Save build state
      if: ${{ always() }}
      uses: actions/cache/save@v4
      with:
        path: .ci-state/build
        key: ${{ runner.os }}-wkappbot-build-state-${{ github.run_id }}
    - name: Upload official bin artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: wkappbot-bin-${{ github.run_id }}
        path: bin/**
        if-no-files-found: warn

  smoke:
    needs: [detect, build]
    if: ${{ always() && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore cached official bin
      uses: actions/cache/restore@v4
      with:
        path: bin
        key: ${{ runner.os }}-wkappbot-build-${{ hashFiles('csharp/**/*.cs', 'csharp/**/*.csproj', 'csharp/**/*.props', 'csharp/**/*.targets', 'csharp/**/*.xaml', 'csharp/WKAppBot.sln') }}
        restore-keys: |
          ${{ runner.os }}-wkappbot-build-run-
          ${{ runner.os }}-wkappbot-build-
    - name: Download official bin artifact
      if: ${{ needs.build.result == 'success' }}
      uses: actions/download-artifact@v4
      with:
        name: wkappbot-bin-${{ github.run_id }}
        path: bin
    - name: Fallback rebuild official bin when missing
      shell: pwsh
      run: |
        if ((Test-Path ./bin/wkappbot.exe) -and (Test-Path ./bin/wkappbot-core.exe)) {
          Write-Host 'Official bin already present.'
          exit 0
        }
        Write-Host 'Official bin missing. Rebuilding fallback bin in smoke job.'
        New-Item -ItemType Directory -Force -Path bin | Out-Null
        dotnet publish csharp/src/WKAppBot.CLI/WKAppBot.CLI.csproj --configuration Release -p:SkipDeployCore=true -o bin
        dotnet publish csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj --configuration Release -p:SkipDeployLauncher=true -o bin
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/skills | Out-Null
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/handlers | Out-Null
        if (Test-Path wkappbot.hq) { Copy-Item -Path wkappbot.hq/* -Destination bin/wkappbot.hq -Recurse -Force }
        Copy-Item -Path skills/* -Destination bin/wkappbot.hq/skills -Recurse -Force
        Copy-Item -Path handlers/* -Destination bin/wkappbot.hq/handlers -Recurse -Force
    - name: Verify official binary folder
      shell: pwsh
      run: |
        if (!(Test-Path ./bin/wkappbot.exe)) { throw 'bin/wkappbot.exe missing' }
        if (!(Test-Path ./bin/wkappbot-core.exe)) { throw 'bin/wkappbot-core.exe missing' }
    - name: Seed bin/wkappbot.hq
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/skills   | Out-Null
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/handlers | Out-Null
        if (Test-Path wkappbot.hq) {
          Copy-Item -Path wkappbot.hq/* -Destination bin/wkappbot.hq -Recurse -Force
        }
        Copy-Item -Path skills/*   -Destination bin/wkappbot.hq/skills   -Recurse -Force
        Copy-Item -Path handlers/* -Destination bin/wkappbot.hq/handlers -Recurse -Force
    - name: AppBot help smoke with sidecar
      shell: pwsh
      run: |
        $file    = 'scripts/smoke-help.ps1'
        $outFile = "$file.smoke.txt"
        $lines   = & pwsh -NoProfile -ExecutionPolicy Bypass -File $file 2>&1
        $code    = $LASTEXITCODE
        @(
          "commit: ${{ github.sha }}",
          "workflow: build-csharp/smoke",
          "script: $file",
          "exitcode: $code",
          "timestamp_utc: $(Get-Date -AsUTC -Format o)",
          ""
        ) + @($lines) | Set-Content -Path $outFile -Encoding utf8
        $lines | ForEach-Object { Write-Host $_ }
        exit $code
    - name: Commit smoke sidecar files
      if: ${{ always() && github.event_name == 'push' }}
      shell: pwsh
      run: |
        git config user.name  'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        $changed = @(git status --porcelain -- '**/*.smoke.txt')
        if ($changed.Count -eq 0) {
          Write-Host 'No smoke sidecar changes to commit.'
          exit 0
        }
        git add -- '**/*.smoke.txt'
        git commit -m 'test: update build smoke sidecar files [skip ci]'
        git push
