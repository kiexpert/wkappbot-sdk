name: build-csharp

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build
      shell: pwsh
      run: dotnet build --configuration Release

    - name: Smoke test --help
      shell: pwsh
      run: dotnet run --project csharp/src/WKAppBot.CLI -- --help

    - name: Smoke test usage
      shell: pwsh
      run: dotnet run --project csharp/src/WKAppBot.CLI -- usage

    - name: Smoke test version
      shell: pwsh
      run: dotnet run --project csharp/src/WKAppBot.CLI -- version
