name: Extended Smoke Tests

on:
  schedule:
    - cron: '0 2 * * *'    # 02:00 UTC daily (11:00 KST)
  push:
    paths:
      - 'scripts/smoke-help.ps1'
      - '.github/workflows/extended-smoke.yml'
  workflow_dispatch:

jobs:
  extended:
    runs-on: windows-latest
    permissions:
      contents: write
    timeout-minutes: 15      # hard cap -- 188 tests should finish in ~5 min

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      with:
        fetch-depth: 0

    # ── Reuse binaries from latest successful build-launcher run ─────────────
    # Avoids a 15-min rebuild. Falls back to building if no artifact found.
    - name: Download latest build artifact
      id: dl_artifact
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        New-Item -Force -ItemType Directory bin | Out-Null

        # Find latest successful build-launcher run on main
        $runs = gh run list --workflow build.yml --status success --branch main `
                  --limit 1 --json databaseId | ConvertFrom-Json
        if (!$runs) { "found=false" | Out-File $env:GITHUB_OUTPUT -Append; exit 0 }

        $runId = $runs[0].databaseId
        Write-Host "Using artifact from build run $runId"
        gh run download $runId --name "wkappbot-bin-$runId" --dir bin
        $dlExit = $LASTEXITCODE
        if ($dlExit -ne 0) {
          Write-Host "Download failed (exit $dlExit) -- will build from source."
          "found=false" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0
        }

        if ((Test-Path bin/wkappbot.exe) -and (Test-Path bin/wkappbot-core.exe)) {
          Write-Host "Artifact ready: $((Get-Item bin/wkappbot-core.exe).Length/1MB)MB core"
          "found=true"  | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        } else {
          Write-Host "Artifact empty -- will build from source."
          "found=false" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        }

    - name: Setup .NET (only if building)
      if: ${{ steps.dl_artifact.outputs.found != 'true' }}
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
      with:
        dotnet-version: 8.0.x

    - name: Restore NuGet cache (only if building)
      if: ${{ steps.dl_artifact.outputs.found != 'true' }}
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.nuget/packages
          ~\AppData\Local\NuGet\v3-cache
        key: ${{ runner.os }}-nuget-${{ hashFiles('csharp/**/*.csproj','csharp/**/*.props') }}
        restore-keys: ${{ runner.os }}-nuget-

    - name: Build from source (fallback)
      if: ${{ steps.dl_artifact.outputs.found != 'true' }}
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.WKAPPBOT_CORE_PAT }}
        CORE_REPO: ${{ secrets.WKAPPBOT_CORE_REPO }}
      run: |
        Write-Host "Building from source (no cached artifact)..."
        New-Item -Force -ItemType Directory bin | Out-Null
        dotnet publish csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj `
          --configuration Release -p:SkipDeployLauncher=true -o bin
        if ($env:CORE_REPO -and $env:GH_TOKEN) {
          $tag = gh release list --repo $env:CORE_REPO --json tagName,createdAt `
            | ConvertFrom-Json `
            | Where-Object { $_.tagName -like 'core-*' } `
            | Sort-Object createdAt -Descending `
            | Select-Object -First 1 -ExpandProperty tagName
          if ($tag) {
            gh release download $tag --repo $env:CORE_REPO --pattern "wkappbot-core.exe" --dir bin --clobber
            Write-Host "Fetched core from $tag"
          } else {
            Write-Host "::warning::No core-* release found in $env:CORE_REPO"
          }
        } else {
          Write-Host "::warning::WKAPPBOT_CORE_PAT/WKAPPBOT_CORE_REPO not set -- wkappbot-core.exe unavailable"
        }

    - name: Seed bin/wkappbot.hq
      shell: pwsh
      run: |
        New-Item -Force -ItemType Directory bin/wkappbot.hq/skills   | Out-Null
        New-Item -Force -ItemType Directory bin/wkappbot.hq/handlers | Out-Null
        if (Test-Path skills)   { Copy-Item skills/*   bin/wkappbot.hq/skills   -Recurse -Force }
        if (Test-Path handlers) { Copy-Item handlers/* bin/wkappbot.hq/handlers -Recurse -Force }

    - name: Verify binary
      shell: pwsh
      run: |
        $v = & bin/wkappbot-core.exe --version 2>$null
        if (!$v) { throw "Binary check failed" }
        Write-Host "Binary: $v"

    # ── Extended smoke ────────────────────────────────────────────────────────
    - name: Run extended smoke
      id: smoke
      shell: pwsh
      run: |
        $env:WKAPPBOT_WORKER = '1'
        $env:CI              = 'true'    # ensure isCI=true inside script

        $outFile = "scripts/smoke-help.ps1.extended-ci.txt"
        $lines   = & pwsh -NoProfile -ExecutionPolicy Bypass `
                     -File "scripts/smoke-help.ps1" -Extended 2>&1
        $code    = $LASTEXITCODE

        $summary = ($lines | Select-String "Smoke results") | Select-Object -Last 1
        $passed  = if ($summary -match '(\d+) passed')    { $Matches[1] } else { '0' }
        $soft    = if ($summary -match '(\d+) soft-fail') { $Matches[1] } else { '0' }
        $hard    = if ($summary -match '(\d+) hard-fail') { $Matches[1] } else { '0' }

        @(
          "commit: ${{ github.sha }}"
          "workflow: extended-smoke"
          "exitcode: $code  passed: $passed  soft: $soft  hard: $hard"
          "timestamp_utc: $(Get-Date -AsUTC -Format o)"
          ""
        ) + @($lines | Where-Object { $_ -match 'Section |results:|HARD-FAIL|ASSERT FAIL|SKIP-CI|passed|soft-fail' }) |
          Set-Content $outFile -Encoding utf8

        $lines | ForEach-Object { Write-Host $_ }

        "passed=$passed" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        "soft=$soft"     | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        "hard=$hard"     | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        exit 0  # hard-fail gate handled by separate step below

    # ── Job summary ───────────────────────────────────────────────────────────
    - name: Write Job Summary
      if: ${{ always() }}
      shell: pwsh
      run: |
        $passed = '${{ steps.smoke.outputs.passed }}'
        $soft   = '${{ steps.smoke.outputs.soft }}'
        $hard   = [int]'${{ steps.smoke.outputs.hard }}'
        $icon   = if ($hard -eq 0) { ':green_circle:' } `
                  elseif ($hard -le 5) { ':yellow_circle:' } `
                  else { ':red_circle:' }

        @"
        ## $icon Extended Smoke -- ${{ github.sha }}

        | | Count |
        |---|---|
        | Passed | $passed |
        | Soft-fail (env/external) | $soft |
        | **Hard-fail** | **$hard** |

        > Soft-fails expected: Slack/TTS/AI (no creds), UWP timing, Chrome CDP.
        > Hard-fails = real regressions.
        "@ | Add-Content $env:GITHUB_STEP_SUMMARY

    - name: Fail on excessive hard-fails
      shell: pwsh
      run: |
        $hard = [int]'${{ steps.smoke.outputs.hard }}'
        if ($hard -gt 5) { Write-Host "FAIL: $hard hard-fails"; exit 1 }
        Write-Host "OK: $hard hard-fail(s)"

    - name: Kill orphan test processes
      if: ${{ always() }}
      shell: pwsh
      run: |
        'CalculatorApp','win32calc','Notepad','chrome' | ForEach-Object {
          $procs = Get-Process $_ -ErrorAction SilentlyContinue
          if ($procs) { $procs | Stop-Process -Force; Write-Host "Killed: $_" }
        }

    - name: Commit sidecar
      if: ${{ always() }}
      shell: pwsh
      run: |
        git config user.name  'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        $changed = @(git status --porcelain -- '**/*.extended-ci.txt')
        if ($changed.Count -eq 0) { Write-Host 'No sidecar changes.'; exit 0 }
        git add -- '**/*.extended-ci.txt'
        git commit -m 'test: update extended smoke CI sidecar [skip ci]'
        $ok = $false
        for ($i = 1; $i -le 5; $i++) {
          git pull --rebase --autostash origin main
          git push origin HEAD:main
          if ($LASTEXITCODE -eq 0) { $ok = $true; Write-Host "Pushed (attempt $i)"; break }
          Write-Host "Push attempt $i failed, retrying..."
          Start-Sleep -Seconds (2 * $i)
        }
        if (-not $ok) { Write-Host 'All push attempts failed (branch protection) — skipping'; exit 0 }
