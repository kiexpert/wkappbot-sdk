name: extended-smoke

on:
  schedule:
    - cron: '0 2 * * *'    # 02:00 UTC daily (11:00 KST)
  push:
    paths:
      - 'scripts/smoke-help.ps1'
      - 'scripts/gen-command-ref.sh'
      - 'csharp/**'
      - '.github/workflows/extended-smoke.yml'
  workflow_dispatch:
    inputs:
      sections:
        description: 'Section filter (e.g. "13 14 15" to run only those sections, empty = all)'
        required: false
        default: ''

jobs:
  extended:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore NuGet cache
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/.nuget/packages
          ~\AppData\Local\NuGet\v3-cache
        key: ${{ runner.os }}-nuget-${{ hashFiles('csharp/**/*.csproj', 'csharp/**/*.props') }}
        restore-keys: ${{ runner.os }}-nuget-

    - name: Restore latest build
      uses: actions/cache/restore@v4
      with:
        path: bin
        key: ${{ runner.os }}-sdk-build-${{ hashFiles('csharp/**/*.cs', 'csharp/**/*.csproj', 'csharp/**/*.props') }}
        restore-keys: |
          ${{ runner.os }}-sdk-build-run-
          ${{ runner.os }}-sdk-build-

    - name: Build if binaries missing
      shell: pwsh
      run: |
        if ((Test-Path bin/wkappbot.exe) -and (Test-Path bin/wkappbot-core.exe)) {
          Write-Host "Binaries present from cache."
        } else {
          Write-Host "Building..."
          New-Item -Force -ItemType Directory bin | Out-Null
          dotnet publish csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj `
            --configuration Release -p:SkipDeployLauncher=true -o bin
          dotnet publish csharp/src/WKAppBot.CLI/WKAppBot.CLI.csproj `
            --configuration Release -p:SkipDeployCore=true -o bin
        }
        New-Item -Force -ItemType Directory bin/wkappbot.hq/skills   | Out-Null
        New-Item -Force -ItemType Directory bin/wkappbot.hq/handlers | Out-Null
        if (Test-Path skills)   { Copy-Item skills/*   bin/wkappbot.hq/skills   -Recurse -Force }
        if (Test-Path handlers) { Copy-Item handlers/* bin/wkappbot.hq/handlers -Recurse -Force }

    - name: Verify binary
      shell: pwsh
      run: |
        $v = & bin/wkappbot-core.exe --version 2>$null
        Write-Host "Binary: $v"
        if (!$v) { throw "Binary check failed" }

    - name: Run extended smoke
      id: smoke
      shell: pwsh
      run: |
        $env:WKAPPBOT_WORKER = '1'

        $outFile = "scripts/smoke-help.ps1.extended-ci.txt"
        $lines   = & pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/smoke-help.ps1" -Extended 2>&1
        $code    = $LASTEXITCODE

        # Parse counts from summary line
        $summary = $lines | Select-String "Smoke results"
        $passed  = if ($summary -match '(\d+) passed')   { $Matches[1] } else { '?' }
        $soft    = if ($summary -match '(\d+) soft-fail') { $Matches[1] } else { '?' }
        $hard    = if ($summary -match '(\d+) hard-fail') { $Matches[1] } else { '?' }

        # Write sidecar
        @(
          "commit: ${{ github.sha }}"
          "workflow: extended-smoke"
          "runner: ${{ runner.os }}"
          "exitcode: $code"
          "passed: $passed  soft-fail: $soft  hard-fail: $hard"
          "timestamp_utc: $(Get-Date -AsUTC -Format o)"
          ""
        ) + @($lines) | Set-Content $outFile -Encoding utf8

        # Print to log
        $lines | ForEach-Object { Write-Host $_ }

        # Output for steps
        "passed=$passed"  | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        "soft=$soft"      | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        "hard=$hard"      | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        "exit_code=$code" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

        # Don't fail the job -- let the summary show the counts
        exit 0

    - name: Write Job Summary
      if: ${{ always() }}
      shell: pwsh
      run: |
        $passed = '${{ steps.smoke.outputs.passed }}'
        $soft   = '${{ steps.smoke.outputs.soft }}'
        $hard   = '${{ steps.smoke.outputs.hard }}'
        $code   = '${{ steps.smoke.outputs.exit_code }}'

        $icon = if ($hard -eq '0') { 'green_circle' } `
                elseif ([int]$hard -le 3) { 'yellow_circle' } `
                else { 'red_circle' }

        @"
        ## :$icon: Extended Smoke Results

        | Metric | Count |
        |--------|-------|
        | Passed | $passed |
        | Soft-fail (external/env) | $soft |
        | **Hard-fail** | **$hard** |

        - Commit: ``${{ github.sha }}``
        - Runner: ``${{ runner.os }}`` (windows-latest)
        - Exit code: ``$code``

        > Soft-fails are expected on CI: external services (Slack, TTS, Ask AI),
        > UWP app timing races, and focus-dependent operations.
        > Hard-fails indicate real regressions.
        "@ | Add-Content $env:GITHUB_STEP_SUMMARY

    - name: Fail if too many hard-fails
      shell: pwsh
      run: |
        $hard = [int]'${{ steps.smoke.outputs.hard }}'
        # Allow up to 5 hard-fails (some tests are genuinely env-dependent on CI)
        if ($hard -gt 5) {
          Write-Host "FAIL: $hard hard-fails exceed threshold (5)"
          exit 1
        }
        Write-Host "OK: $hard hard-fail(s) within threshold"

    - name: Commit sidecar
      if: ${{ always() && github.event_name != 'pull_request' }}
      shell: pwsh
      run: |
        git config user.name  'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        $changed = @(git status --porcelain -- '**/*.extended-ci.txt')
        if ($changed.Count -eq 0) { Write-Host 'No sidecar changes.'; exit 0 }
        git add -- '**/*.extended-ci.txt'
        git commit -m 'test: update extended smoke CI sidecar [skip ci]'
        $ok = $false
        for ($i = 1; $i -le 5; $i++) {
          git pull --rebase origin main
          git push origin HEAD:main
          if ($LASTEXITCODE -eq 0) { $ok = $true; break }
          Write-Host "Push attempt $i failed, retrying..."; Start-Sleep -Seconds (2 * $i)
        }
        if (-not $ok) { Write-Host 'Push failed'; exit 1 }
