name: Sponsor License

on:
  workflow_dispatch:
    inputs:
      sponsor_login:
        description: "GitHub sponsor login"
        required: true
      sponsor_amount:
        description: "Monthly amount in USD"
        required: true
      event_action:
        description: "Action: created / cancelled / tier_changed"
        required: true
        default: "created"

permissions:
  contents: read

jobs:
  manage-license:
    runs-on: ubuntu-latest
    # No environment gate: sponsorship events are already authenticated by GitHub
    # (genuine payment webhooks). Manual approval would block all activations.
    concurrency:
      group: license-grant
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Grant or revoke license
        env:
          GH_LICENSE_TOKEN: ${{ secrets.GH_LICENSE_TOKEN }}
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SPONSOR_LOGIN:    ${{ github.event.inputs.sponsor_login }}
          SPONSOR_AMOUNT:   ${{ github.event.inputs.sponsor_amount }}
          TIER_NAME:        ""
          IS_ONE_TIME:      "false"
          EVENT_ACTION:     ${{ github.event.inputs.event_action }}
        run: |
          python3 .github/scripts/sponsor_license.py \
            --user  "$SPONSOR_LOGIN" \
            --amount "$SPONSOR_AMOUNT" \
            --type  "$([ "$IS_ONE_TIME" = "true" ] && echo one_time || echo monthly)" \
            --action "$EVENT_ACTION"
