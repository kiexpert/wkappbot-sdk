name: gha-triad

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Question for the triad debate'
        required: true
        type: string
      post_to_issue:
        description: 'Post synthesis to GitHub issue (issue number)'
        required: false
        type: string

jobs:
  # ── Round 1: Thesis ────────────────────────────────────────────────────
  thesis:
    name: "R1 Thesis — ${{ matrix.ai }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ai: [gemini, groq, cerebras]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Call ${{ matrix.ai }} (thesis)
      env:
        QUESTION:         ${{ inputs.question }}
        GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      run: python3 scripts/triad_gha.py thesis "${{ matrix.ai }}" "$QUESTION"

    - uses: actions/upload-artifact@v4
      with:
        name: r1-${{ matrix.ai }}
        path: r1-${{ matrix.ai }}.txt

  # ── Round 2: Antithesis ────────────────────────────────────────────────
  antithesis:
    name: "R2 Antithesis — ${{ matrix.ai }}"
    needs: thesis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ai: [gemini, groq, cerebras]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        pattern: r1-*
        merge-multiple: true

    - name: Critique as ${{ matrix.ai }}
      env:
        QUESTION:         ${{ inputs.question }}
        GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      run: python3 scripts/triad_gha.py antithesis "${{ matrix.ai }}" "$QUESTION"

    - uses: actions/upload-artifact@v4
      with:
        name: r2-${{ matrix.ai }}
        path: r2-${{ matrix.ai }}.txt

  # ── Round 3: Synthesis ─────────────────────────────────────────────────
  synthesis:
    name: "R3 Synthesis"
    needs: antithesis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        pattern: 'r[12]-*'
        merge-multiple: true

    - name: Synthesize (Opus → Groq fallback)
      env:
        QUESTION:          ${{ inputs.question }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
      run: python3 scripts/triad_gha.py synthesis "$QUESTION"

    - uses: actions/upload-artifact@v4
      with:
        name: triad-synthesis
        path: synthesis.md

    - name: Post to GitHub issue
      if: ${{ inputs.post_to_issue != '' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh issue comment ${{ inputs.post_to_issue }} \
          --repo ${{ github.repository }} \
          --body-file synthesis.md

    - name: Write job summary
      run: |
        echo "## Triad Synthesis Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        cat synthesis.md >> $GITHUB_STEP_SUMMARY
