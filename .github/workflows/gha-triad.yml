name: GHA Triad Debate

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Question for the triad debate'
        required: true
        type: string
      post_to_issue:
        description: 'Post synthesis to GitHub issue (issue number)'
        required: false
        type: string

jobs:
  # ── Round 1: Thesis ────────────────────────────────────────────────────
  thesis:
    name: "R1 Thesis — ${{ matrix.ai }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ai: [gemini, groq, cerebras]
      fail-fast: false

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

    - name: Call ${{ matrix.ai }} (thesis)
      env:
        QUESTION:         ${{ inputs.question }}
        GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      run: python3 scripts/triad_gha.py thesis "${{ matrix.ai }}" "$QUESTION"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: r1-${{ matrix.ai }}
        path: r1-${{ matrix.ai }}.txt

  # ── Round 2: Antithesis ────────────────────────────────────────────────
  antithesis:
    name: "R2 Antithesis — ${{ matrix.ai }}"
    needs: thesis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ai: [gemini, groq, cerebras]
      fail-fast: false

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

    - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        pattern: r1-*
        merge-multiple: true

    - name: Critique as ${{ matrix.ai }}
      env:
        QUESTION:         ${{ inputs.question }}
        GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      run: python3 scripts/triad_gha.py antithesis "${{ matrix.ai }}" "$QUESTION"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: r2-${{ matrix.ai }}
        path: r2-${{ matrix.ai }}.txt

  # ── Round 3: Synthesis ─────────────────────────────────────────────────
  synthesis:
    name: "R3 Synthesis"
    needs: antithesis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

    - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        pattern: 'r[12]-*'
        merge-multiple: true

    - name: Synthesize (Opus → Groq fallback)
      env:
        QUESTION:          ${{ inputs.question }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
      run: python3 scripts/triad_gha.py synthesis "$QUESTION"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: triad-synthesis
        path: synthesis.md

    - name: Post to GitHub issue
      if: ${{ inputs.post_to_issue != '' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ISSUE_NUMBER: ${{ inputs.post_to_issue }}
        REPO: ${{ github.repository }}
      run: |
        # Validate issue number is numeric only (prevent shell injection)
        if ! [[ "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
          echo "ERROR: post_to_issue must be a numeric issue number."
          exit 1
        fi
        gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file synthesis.md

    - name: Write job summary
      run: |
        echo "## Triad Synthesis Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        cat synthesis.md >> $GITHUB_STEP_SUMMARY
