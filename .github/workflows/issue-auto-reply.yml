name: Issue Auto-Reply

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reply to new issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reply = require('./.github/scripts/issue-reply.js');
            await reply({ context, github });
