name: PayPal License Automation

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      test_user:
        description: 'GitHub username to grant test license (skips PayPal API)'
        required: false
      test_amount:
        description: 'Test amount in USD (default 8 = 2 days)'
        required: false
        default: '8'

permissions:
  contents: read

jobs:
  process-paypal:
    runs-on: ubuntu-latest
    environment: license-production
    concurrency:
      group: license-grant
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Guard test mode (admin-only)
        if: ${{ inputs.test_user != '' }}
        run: |
          if [ "${{ github.actor }}" != "kiexpert" ]; then
            echo "ERROR: test_user input is restricted to repo admin only."
            exit 1
          fi

      - name: Process PayPal transactions
        env:
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          GH_LICENSE_TOKEN: ${{ secrets.GH_LICENSE_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TEST_USER: ${{ inputs.test_user }}
          TEST_AMOUNT: ${{ inputs.test_amount }}
        run: python3 .github/scripts/paypal_license.py
