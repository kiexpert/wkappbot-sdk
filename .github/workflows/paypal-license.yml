name: PayPal License Automation

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  process-paypal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Process PayPal transactions
        env:
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          GH_LICENSE_TOKEN: ${{ secrets.GH_LICENSE_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python3 .github/scripts/paypal_license.py
