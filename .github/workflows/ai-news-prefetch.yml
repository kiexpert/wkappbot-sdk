name: AI News Prefetch

on:
  schedule:
    - cron: '0 2,10 * * *'   # 11:00 KST / 19:00 KST (UTC+9)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prefetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WKAppBot
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          repository: kiexpert/WKAppBot
          token: ${{ secrets.WKAPPBOT_PAT }}
          path: wkappbot

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Collect raw HN + YouTube (no Claude)
        run: |
          # CI=true skips the Claude filter step in the script
          # Only raw data collection: HN Algolia + YouTube RSS
          sed 's/python\.exe/python3/g' \
            wkappbot/bin/wkappbot.hq/scripts/ai-news-prefetch.sh \
            > /tmp/prefetch.sh
          chmod +x /tmp/prefetch.sh
          cd wkappbot
          CI=true bash /tmp/prefetch.sh

      - name: Commit raw results
        run: |
          cd wkappbot
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/wkappbot.hq/data/ai-news-raw.jsonl
          if git diff --staged --quiet; then
            echo "No new items"
          else
            COUNT=$(grep -c '{' bin/wkappbot.hq/data/ai-news-raw.jsonl 2>/dev/null || echo 0)
            git commit -m "chore(ai-news): raw prefetch ${COUNT} items [skip ci]"
            git push
          fi
