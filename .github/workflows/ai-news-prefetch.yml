name: AI News Prefetch

on:
  schedule:
    - cron: '0 2,10 * * *'   # 11:00 KST / 19:00 KST (UTC+9)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prefetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WKAppBot
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          repository: kiexpert/WKAppBot
          token: ${{ secrets.WKAPPBOT_PAT }}
          path: wkappbot

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Collect raw HN + YouTube (no Claude)
        run: |
          # CI=true skips the Claude filter step in the script
          # Only raw data collection: HN Algolia + YouTube RSS
          cd wkappbot
          sed 's/python\.exe/python3/g' \
            bin/wkappbot.hq/scripts/ai-news-prefetch.sh \
            > bin/wkappbot.hq/scripts/prefetch-ci.sh
          chmod +x bin/wkappbot.hq/scripts/prefetch-ci.sh
          CI=true bash bin/wkappbot.hq/scripts/prefetch-ci.sh

      - name: Commit raw results
        run: |
          cd wkappbot
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f bin/wkappbot.hq/data/ai-news-raw.jsonl
          if git diff --staged --quiet; then
            echo "No new items"
          else
            COUNT=$(grep -c '{' bin/wkappbot.hq/data/ai-news-raw.jsonl 2>/dev/null || echo 0)
            git commit -m "chore(ai-news): raw prefetch ${COUNT} items [skip ci]"
            git push
          fi
