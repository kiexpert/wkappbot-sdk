name: CodeQL

on:
  push:
    branches: [main]
    paths: ['csharp/**']
  pull_request:
    branches: [main]
    paths: ['csharp/**']
  schedule:
    - cron: '0 3 * * 1'  # weekly Monday 03:00 UTC

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: windows-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
      with:
        dotnet-version: 8.0.x

    - name: Initialize CodeQL
      uses: github/codeql-action/init@ed410739ba306e4ebe5e123421a6bd694e494a2b  # v4
      with:
        languages: csharp

    - name: Build
      shell: pwsh
      run: |
        dotnet build csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj `
          --configuration Release /p:EnableWindowsTargeting=true

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@ed410739ba306e4ebe5e123421a6bd694e494a2b  # v4
