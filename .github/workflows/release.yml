name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v6.4.1)'
        required: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Restrict manual dispatch to admin
      if: github.event_name == 'workflow_dispatch'
      run: |
        if ("${{ github.actor }}" -ne "kiexpert") {
          Write-Error "ERROR: Manual release dispatch is restricted to repo admin only."
          exit 1
        }

    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
      with:
        dotnet-version: 8.0.x

    - name: Resolve tag and version
      id: ver
      shell: pwsh
      run: |
        $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
          '${{ inputs.tag }}'
        } else {
          '${{ github.ref_name }}'
        }
        $ver = $tag -replace '^v', ''
        "tag=$tag"     | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        "version=$ver" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        Write-Host "Releasing $tag (version $ver)"

    # ── Build ──────────────────────────────────────────────────────────────────
    - name: Restore NuGet cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.nuget/packages
          ~\AppData\Local\NuGet\v3-cache
        key: ${{ runner.os }}-nuget-${{ hashFiles('csharp/**/*.csproj', 'csharp/**/*.props') }}
        restore-keys: ${{ runner.os }}-nuget-

    - name: Build launcher
      shell: pwsh
      run: |
        New-Item -Force -ItemType Directory bin | Out-Null
        dotnet publish csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj `
          --configuration Release -p:SkipDeployLauncher=true -o bin

    # Fetch core from private dev repo's latest release ZIP; fall back to source build.
    - name: Fetch core binary (private release)
      id: fetch_core
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.WKAPPBOT_CORE_PAT }}
        CORE_REPO: ${{ secrets.WKAPPBOT_CORE_REPO }}
      run: |
        if (-not $env:CORE_REPO -or -not $env:GH_TOKEN) {
          Write-Host 'WKAPPBOT_CORE_REPO / WKAPPBOT_CORE_PAT not set -- will build from source.'
          "fetched=false" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0
        }
        Write-Host "Fetching core ZIP from $env:CORE_REPO latest release..."
        try {
          $tmp = New-TemporaryFile | ForEach-Object { Remove-Item $_; New-Item -ItemType Directory -Path "$_.d" -Force }
          $tag = gh release list --repo $env:CORE_REPO --json tagName,createdAt `
            | ConvertFrom-Json `
            | Where-Object { $_.tagName -like 'core-*' } `
            | Sort-Object createdAt -Descending `
            | Select-Object -First 1 -ExpandProperty tagName
          if (-not $tag) { throw "No core-* release found in $env:CORE_REPO" }
          Write-Host "Found: $tag"
          gh release download $tag --repo $env:CORE_REPO --pattern "wkappbot-core.exe" --dir bin --clobber
          if (-not (Test-Path bin/wkappbot-core.exe)) { throw "wkappbot-core.exe not found in release $tag" }
          Write-Host "Fetched: $('{0:N1} MB' -f ((Get-Item bin/wkappbot-core.exe).Length / 1MB)) from $tag"
          "fetched=true" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        } catch {
          Write-Host "Fetch failed ($_) -- falling back to source build."
          "fetched=false" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
        }

    - name: Build core (source fallback)
      if: ${{ steps.fetch_core.outputs.fetched != 'true' }}
      shell: pwsh
      run: |
        Write-Host "::error::Core binary unavailable: WKAPPBOT_CORE_PAT/WKAPPBOT_CORE_REPO not set or fetch failed."
        Write-Host "Set the secrets and re-run, or upload wkappbot-core.exe manually to the release."
        exit 1

    - name: Seed bin/wkappbot.hq
      shell: pwsh
      run: |
        New-Item -Force -ItemType Directory bin/wkappbot.hq/skills | Out-Null
        if (Test-Path skills) { Copy-Item skills/* bin/wkappbot.hq/skills -Recurse -Force }

    - name: Verify binaries
      shell: pwsh
      run: |
        if (!(Test-Path bin/wkappbot.exe))      { throw 'wkappbot.exe missing' }
        if (!(Test-Path bin/wkappbot-core.exe)) { throw 'wkappbot-core.exe missing' }

    # ── Bundle & publish ────────────────────────────────────────────────────────
    - name: Create release zip
      shell: pwsh
      run: |
        $zip = "wkappbot-${{ steps.ver.outputs.version }}.zip"
        Compress-Archive `
          -Path bin/wkappbot.exe, bin/wkappbot-core.exe `
          -DestinationPath $zip
        Write-Host "Bundled $zip ($('{0:N1} MB' -f ((Get-Item $zip).Length / 1MB)))"

    - name: Publish GitHub Release
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = '${{ steps.ver.outputs.tag }}'
        $zip = "wkappbot-${{ steps.ver.outputs.version }}.zip"

        gh release create $tag $zip `
          --title "WKAppBot $tag" `
          --generate-notes `
          --verify-tag
        Write-Host "Release published: https://github.com/${{ github.repository }}/releases/tag/$tag"
