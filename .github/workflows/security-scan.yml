name: security-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # weekly Monday 02:00 UTC
  workflow_dispatch:

jobs:
  trufflehog:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Filesystem scan (whole repo): avoids the BASE==HEAD bug on first push / force-push.
    # Trade-off: scans the entire tree every run instead of diff-only.
    - name: TruffleHog OSS (filesystem scan)
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        extra_args: --only-verified

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
