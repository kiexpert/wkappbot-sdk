name: Skill Check

on:
  push:
    paths:
      - 'skills/**/*.skill.json'
  pull_request:
    paths:
      - 'skills/**/*.skill.json'

jobs:
  validate:
    name: Validate skill JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill structure
        run: python3 .github/scripts/validate_skills.py
