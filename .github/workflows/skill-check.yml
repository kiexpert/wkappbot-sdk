name: Skill Check

on:
  push:
    paths:
      - 'skills/**/*.skill.json'
  pull_request:
    paths:
      - 'skills/**/*.skill.json'

permissions:
  contents: read

jobs:
  validate:
    name: Validate skill JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill structure
        run: python3 .github/scripts/validate_skills.py

      - name: Notify skill author via pending_prompts
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_LICENSE_TOKEN }}
        run: python3 .github/scripts/notify_skill_author.py
