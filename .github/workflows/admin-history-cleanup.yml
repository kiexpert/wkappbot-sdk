name: Admin History Cleanup
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without force-pushing"
        required: false
        default: "true"
      target_branch:
        description: "Branch to rewrite"
        required: false
        default: "main"
permissions:
  contents: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Restrict to repo admin only
        run: |
          if [ "${{ github.actor }}" != "kiexpert" ]; then
            echo "ERROR: Admin History Cleanup is restricted to repo admin only."
            exit 1
          fi
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch || 'main' }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.x'
      - run: |
          python -m pip install --upgrade pip
          pip install git-filter-repo
      - run: |
          git filter-repo --force \
            --invert-paths \
            --path handoff_slack_setup.txt \
            --path .wkappbot/ \
            --path-glob '*/.wkappbot/*' \
            --path-glob '*/.bak/*' \
            --path-glob '*.bak'
      - run: git log --oneline -n 5
      - if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force --prune origin HEAD:${{ github.event.inputs.target_branch || 'main' }}