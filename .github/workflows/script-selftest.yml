name: script-selftest

on:
  push:
    paths:
      - '**/*.ps1'
      - '**/*.py'
      - '**/*.sh'
      - '.github/workflows/script-selftest.yml'
  workflow_dispatch:

jobs:
  script_selftest:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Restore cached bin
      uses: actions/cache/restore@v4
      with:
        path: |
          bin
          csharp/**/obj
        key: ${{ runner.os }}-wkappbot-build-${{ hashFiles('csharp/**/*.cs', 'csharp/**/*.csproj', 'csharp/**/*.props', 'csharp/**/*.targets', 'csharp/**/*.xaml', 'csharp/WKAppBot.sln') }}
        restore-keys: |
          ${{ runner.os }}-wkappbot-build-run-
          ${{ runner.os }}-wkappbot-build-

    - name: Ensure bin (rebuild if missing)
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path bin | Out-Null
        if ((Test-Path ./bin/wkappbot.exe) -and (Test-Path ./bin/wkappbot-core.exe)) {
          Write-Host 'bin already present, skipping rebuild.'
        } else {
          Write-Host 'bin missing — rebuilding.'
          dotnet publish csharp/src/WKAppBot.CLI/WKAppBot.CLI.csproj --configuration Release -p:SkipDeployCore=true -o bin
          dotnet publish csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj --configuration Release -p:SkipDeployLauncher=true -o bin
        }
        if (!((Test-Path ./bin/wkappbot.exe) -and (Test-Path ./bin/wkappbot-core.exe))) {
          throw 'bin/wkappbot.exe or wkappbot-core.exe missing after ensure step'
        }

    - name: Seed bin/wkappbot.hq
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/skills   | Out-Null
        New-Item -ItemType Directory -Force -Path bin/wkappbot.hq/handlers | Out-Null
        if (Test-Path wkappbot.hq) {
          Copy-Item -Path wkappbot.hq/* -Destination bin/wkappbot.hq -Recurse -Force
        }
        Copy-Item -Path skills/*   -Destination bin/wkappbot.hq/skills   -Recurse -Force
        Copy-Item -Path handlers/* -Destination bin/wkappbot.hq/handlers -Recurse -Force

    - name: Prepare PATH and Python cache dirs
      shell: pwsh
      run: |
        $pipCacheDir    = Join-Path $PWD 'bin/pip-cache'
        $pythonUserBase = Join-Path $PWD 'bin/py-user'
        $pyScripts      = Join-Path $pythonUserBase 'Scripts'
        foreach ($d in @($pipCacheDir, $pythonUserBase, $pyScripts)) {
          New-Item -ItemType Directory -Force -Path $d | Out-Null
        }
        "PATH=$PWD/bin;$pyScripts;$env:PATH"      | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "PIP_CACHE_DIR=$pipCacheDir"               | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "PYTHONUSERBASE=$pythonUserBase"            | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "PIP_DISABLE_PIP_VERSION_CHECK=1"          | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: Find changed scripts
      id: find_scripts
      shell: pwsh
      run: |
        if ('${{ github.event_name }}' -ne 'push') {
          Write-Host 'workflow_dispatch — skipping script self-test.'
          'files=[]' | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0
        }
        $json   = & pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/get-latest-script-files.ps1
        $result = $json | ConvertFrom-Json
        if (-not $result.selectedCommit -or $result.files.Count -eq 0) {
          Write-Host 'No changed script files found.'
          'files=[]' | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0
        }
        Write-Host "Commit: $($result.selectedCommit)"
        $result.files | ForEach-Object { Write-Host "SCRIPT: $_" }
        $filesJson = ($result.files | ConvertTo-Json -Compress)
        "commit=$($result.selectedCommit)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "files=$filesJson"                 | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Run self-tests
      if: ${{ steps.find_scripts.outputs.files != '[]' && steps.find_scripts.outputs.files != '' }}
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $files  = '${{ steps.find_scripts.outputs.files }}' | ConvertFrom-Json
        $commit = '${{ steps.find_scripts.outputs.commit }}'
        $bash   = Get-Command bash -ErrorAction SilentlyContinue
        $failed = @()

        foreach ($file in $files) {
          Write-Host "== SELF-TEST: $file =="
          $outFile = "$file.self-test.txt"
          $outDir  = Split-Path -Parent $outFile
          if ($outDir) { New-Item -ItemType Directory -Force -Path $outDir | Out-Null }

          if ($file.EndsWith('.ps1')) {
            $lines = & pwsh -NoProfile -ExecutionPolicy Bypass -File $file 2>&1
          } elseif ($file.EndsWith('.py')) {
            $lines = & python $file 2>&1
          } elseif ($file.EndsWith('.sh')) {
            if (-not $bash) { throw 'bash not found on runner' }
            $lines = & bash $file 2>&1
          } else {
            Write-Host "Skipping unknown type: $file"
            continue
          }

          $code = $LASTEXITCODE
          @(
            "commit: $commit",
            "script: $file",
            "exitcode: $code",
            "timestamp_utc: $(Get-Date -AsUTC -Format o)",
            ""
          ) + @($lines) | Set-Content -Path $outFile -Encoding utf8

          $lines | ForEach-Object { Write-Host $_ }
          if ($code -ne 0) { $failed += $file }
        }

        if ($failed.Count -gt 0) {
          throw "Self-test failed: $($failed -join ', ')"
        }

    - name: Commit and push sidecar files
      if: ${{ always() && github.event_name == 'push' }}
      shell: pwsh
      run: |
        git config user.name  'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        $changed = @(git status --porcelain -- '**/*.self-test.txt')
        if ($changed.Count -eq 0) {
          Write-Host 'No sidecar changes to commit.'
          exit 0
        }
        git add -- '**/*.self-test.txt'
        git commit -m 'test: update script self-test sidecar files [skip ci]'
        # Retry push with rebase to handle concurrent-push races (multiple pushes while CI runs)
        $ok = $false
        for ($i = 1; $i -le 5; $i++) {
          git pull --rebase origin main
          git push origin HEAD:main
          if ($LASTEXITCODE -eq 0) { $ok = $true; Write-Host "Pushed on attempt $i"; break }
          Write-Host "Push attempt $i failed (exit=$LASTEXITCODE), retrying..."
          Start-Sleep -Seconds (2 * $i)
        }
        if (-not $ok) { Write-Host 'All push attempts failed'; exit 1 }

    - name: Save updated bin cache
      if: ${{ always() }}
      uses: actions/cache/save@v4
      with:
        path: |
          bin
          csharp/**/obj
        key: ${{ runner.os }}-wkappbot-build-run-${{ github.run_id }}
