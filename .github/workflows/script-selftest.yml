name: script-selftest

on: [push, workflow_dispatch]

jobs:
  script_selftest:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore cached official bin
      uses: actions/cache@v4
      with:
        path: bin
        key: ${{ runner.os }}-wkappbot-bin-${{ hashFiles('csharp/**/*.cs', 'csharp/**/*.csproj', 'csharp/**/*.props', 'csharp/**/*.targets', 'csharp/**/*.xaml', 'csharp/WKAppBot.sln') }}
    - name: Immediate changed script self-test
      shell: pwsh
      run: |
        if ('${{ github.event_name }}' -ne 'push') {
          Write-Host 'Skip immediate script self-test on workflow_dispatch.'
          exit 0
        }
        $before = '${{ github.event.before }}'
        $after = '${{ github.sha }}'
        if ([string]::IsNullOrWhiteSpace($before) -or $before -match '^0+$') {
          Write-Host 'No valid before SHA. Skip immediate script self-test.'
          exit 0
        }
        $files = @(git diff --name-only $before $after | Where-Object { $_ -match '\.(py|ps1|sh)$' })
        if (!$files) {
          Write-Host 'No changed .py/.ps1/.sh files.'
          exit 0
        }
        $needsBin = $files -contains 'scripts/smoke-help.ps1'
        if ($needsBin) {
          if (!((Test-Path ./bin/wkappbot.exe) -and (Test-Path ./bin/wkappbot-core.exe))) {
            Write-Host 'Official bin missing. Rebuilding fallback bin in script-selftest.'
            New-Item -ItemType Directory -Force -Path bin | Out-Null
            dotnet publish csharp/src/WKAppBot.CLI/WKAppBot.CLI.csproj --configuration Release -p:SkipDeployCore=true -o bin
            dotnet publish csharp/src/WKAppBot.Launcher/WKAppBot.Launcher.csproj --configuration Release -p:SkipDeployLauncher=true -o bin
          }
        }
        foreach ($file in $files) {
          Write-Host "== SCRIPT SELF-TEST $file =="
          if ($file -eq 'scripts/smoke-help.ps1') {
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$null, [ref]$parseErrors)
            if ($parseErrors -and $parseErrors.Count -gt 0) {
              $parseErrors | ForEach-Object { Write-Host $_ }
              throw "Script self-test failed: $file"
            }
            if (!((Test-Path ./bin/wkappbot.exe) -and (Test-Path ./bin/wkappbot-core.exe))) { throw 'bin restore/rebuild failed for smoke-help self-test' }
            Write-Host 'Syntax OK: scripts/smoke-help.ps1'
            continue
          }
          if ($file.EndsWith('.ps1')) {
            & pwsh -NoProfile -ExecutionPolicy Bypass -File $file
          } elseif ($file.EndsWith('.py')) {
            & python $file
          } elseif ($file.EndsWith('.sh')) {
            & bash $file
          }
          if ($LASTEXITCODE -ne 0) { throw "Script self-test failed: $file" }
        }
